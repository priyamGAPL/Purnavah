<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purnavah — Order Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C1B17;
  --moss:#3A5428;
  --moss-mid:#527A3B;
  --moss-lt:#EDF2E8;
  --earth:#7C5C3A;
  --cream:#F5F0E8;
  --parchment:#EDE6D6;
  --rule:#C8BFA8;
  --stone:#7A6F61;
  --white:#FDFCF9;
  --red:#B91C1C;
  --red-lt:#FBECEC;
  --amber:#9A6B0F;
  --amber-lt:#FBF3E1;
  --wa:#25D366;
}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Hanken Grotesk',sans-serif;color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.app{max-width:1400px;margin:0 auto;padding:0 24px 80px}
.topbar{background:var(--ink);color:var(--cream);padding:22px 24px;margin-bottom:28px}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.brand{display:flex;align-items:baseline;gap:12px}
.brand-name{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:.04em}
.brand-tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#A89E8E}
.topbar-actions{display:flex;gap:10px;align-items:center}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--stone);display:inline-block;margin-right:6px}
.conn-dot.ok{background:var(--wa)}
.conn-dot.err{background:var(--red)}
.conn-status{font-size:12px;color:#A89E8E;display:flex;align-items:center}
.nav-link{color:#A89E8E;font-size:12.5px;font-weight:600;text-decoration:none;padding:6px 4px}
.nav-link:hover{color:var(--cream)}

/* ── KEY SETUP BAR ── */
.setup-bar{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px 18px;margin-bottom:24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.setup-bar input[type=text],.setup-bar input[type=password]{flex:1;min-width:220px;padding:9px 12px;border:1.5px solid var(--parchment);border-radius:6px;font-size:13px;font-family:'Hanken Grotesk',sans-serif}
.setup-bar label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--stone)}

/* ── BUTTONS ── */
.btn{font-family:'Hanken Grotesk',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--moss);color:#fff}
.btn-primary:hover{background:#2d4020}
.btn-secondary{background:var(--white);color:var(--ink);border-color:var(--rule)}
.btn-secondary:hover{border-color:var(--moss);color:var(--moss)}
.btn-wa{background:var(--wa);color:#fff}
.btn-wa:hover{background:#1ebe5d}
.btn-danger{background:var(--white);color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red-lt)}
.btn-ghost{background:transparent;color:var(--stone);border-color:transparent;padding:6px 10px}
.btn-ghost:hover{color:var(--ink);background:var(--parchment)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{font-size:12px;padding:6px 12px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px 18px}
.stat-num{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--moss)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-top:2px}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.filter-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--rule);background:var(--white);font-size:12.5px;font-weight:600;color:var(--stone);cursor:pointer;transition:all .12s;white-space:nowrap}
.filter-chip.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.search-input{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--parchment);border-radius:20px;font-size:13px;font-family:'Hanken Grotesk',sans-serif;background:var(--white)}
.search-input:focus{outline:none;border-color:var(--moss)}

/* ── ORDER CARDS ── */
.order-list{display:flex;flex-direction:column;gap:14px}
.order-card{background:var(--white);border:1px solid var(--rule);border-radius:10px;overflow:hidden;transition:box-shadow .15s}
.order-card.dup-flag{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.order-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;gap:16px;flex-wrap:wrap}
.order-head:hover{background:#FEFDFB}
.order-id-block{display:flex;align-items:center;gap:14px;min-width:0}
.order-customer{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink)}
.order-meta{font-size:12px;color:var(--stone);margin-top:2px}
.order-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.flag{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.flag-dup{background:var(--amber-lt);color:var(--amber)}
.order-right{display:flex;align-items:center;gap:18px}
.order-total-block{text-align:right}
.order-total{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--moss)}
.order-total-orig{font-size:11.5px;color:var(--stone);text-decoration:line-through}
.chevron{font-size:18px;color:var(--stone);transition:transform .2s}
.order-card.expanded .chevron{transform:rotate(180deg)}

.order-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
.order-card.expanded .order-body{max-height:3000px}
.order-body-inner{padding:0 20px 20px;border-top:1px solid var(--parchment)}

.body-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;margin-top:16px}
@media(max-width:800px){.body-grid{grid-template-columns:1fr}}

.items-table{width:100%;border-collapse:collapse;font-size:13px}
.items-table th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--stone);padding:6px 8px;border-bottom:1.5px solid var(--rule)}
.items-table td{padding:8px;border-bottom:1px solid var(--parchment);vertical-align:middle}
.items-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.item-name-oos{text-decoration:line-through;color:var(--stone)}
.qty-input{width:52px;padding:5px 6px;border:1.5px solid var(--parchment);border-radius:5px;text-align:center;font-size:13px;font-family:'Hanken Grotesk',sans-serif}
.disc-input{width:52px;padding:5px 6px;border:1.5px solid var(--parchment);border-radius:5px;text-align:center;font-size:13px;font-family:'Hanken Grotesk',sans-serif}
.oos-btn{font-size:11px;color:var(--red);background:none;border:1px solid var(--red);border-radius:4px;padding:3px 8px;cursor:pointer;white-space:nowrap}
.oos-btn.active{background:var(--red);color:#fff}
.oos-btn:hover{background:var(--red-lt)}
.oos-btn.active:hover{background:var(--red)}
.del-item-btn{background:none;border:none;color:var(--stone);cursor:pointer;font-size:14px;padding:2px 8px;border-radius:4px}
.del-item-btn:hover{color:var(--red);background:var(--red-lt)}

.side-panel{display:flex;flex-direction:column;gap:14px}
.panel-section{background:var(--parchment);border-radius:8px;padding:14px 16px}
.panel-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:8px}
.field-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.field-row:last-child{margin-bottom:0}
.field-row label{font-size:12.5px;color:var(--stone);min-width:90px}
.field-row input,.field-row select{flex:1;padding:7px 10px;border:1.5px solid var(--rule);border-radius:5px;font-size:13px;font-family:'Hanken Grotesk',sans-serif;background:#fff}
.field-row > div{flex:1;font-size:13px;color:var(--ink)}
.totals-box{background:#fff;border:1px solid var(--rule);border-radius:6px;padding:12px 14px;font-size:13px}
.totals-row{display:flex;justify-content:space-between;padding:4px 0}
.totals-row.final{font-weight:700;font-size:15px;color:var(--moss);border-top:1px solid var(--parchment);margin-top:6px;padding-top:8px}
.contact-line{font-size:13px;color:var(--ink);line-height:1.7}
.contact-line strong{color:var(--stone);font-weight:600}
.notes-box{font-size:12.5px;color:var(--stone);font-style:italic;background:#fff;border-radius:6px;padding:10px 12px;border:1px solid var(--rule)}

.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

.empty-state{text-align:center;padding:60px 20px;color:var(--stone)}
.empty-state h3{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:6px}

.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--cream);padding:14px 20px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:100;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--red)}

.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS / LIFECYCLE ADDITIONS ── */
.status-pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.04em}
.action-btn-group{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.disc-cell{font-size:11px;line-height:1.6;text-align:right}
.disc-orig{color:var(--stone)}
.disc-saved{color:var(--red)}
.disc-net{font-weight:600;color:var(--ink)}
.shipping-section,.payment-section{background:var(--parchment);border-radius:8px;padding:14px 16px;margin-top:14px}
.section-mini-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin-bottom:10px}
.locked-note{font-size:11px;color:var(--stone);font-style:italic;margin-top:6px}
.add-item-toggle{margin-top:12px}
.add-item-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;padding:12px;background:var(--moss-lt);border-radius:8px}
.add-item-form input{padding:7px 10px;border:1.5px solid var(--rule);border-radius:5px;font-size:13px;font-family:'Hanken Grotesk',sans-serif;background:#fff}
.add-item-form input[type=text]{flex:2;min-width:180px}
.add-item-form input[type=number]{width:70px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-name">Purnavah</div>
      <div class="brand-tag">Order Admin</div>
    </div>
    <div class="topbar-actions">
      <a class="nav-link" href="products.html">Products →</a>
      <span class="conn-status"><span class="conn-dot" id="connDot"></span><span id="connText">Not connected</span></span>
      <button class="btn btn-secondary btn-sm" onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>
</div>

<div class="app">

  <div class="setup-bar" id="setupBar">
    <div style="flex:2;min-width:260px">
      <label>Apps Script Web App URL</label><br>
      <input type="text" id="webhookUrl" placeholder="https://script.google.com/macros/s/XXXX/exec" value="https://script.google.com/macros/s/AKfycbzNo-oJ3nwIwoFxfSi9_lL6cb_x44tzTYj1JYwZqRBW4UxA3iudJhdjDnPts7AVQycs/exec">
    </div>
    <div style="flex:1;min-width:180px">
      <label>Admin Key</label><br>
      <input type="password" id="adminKey" placeholder="your admin key" value="purnavah-admin-2026">
    </div>
    <button class="btn btn-primary" onclick="loadOrders()" id="connectBtn">Connect</button>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total orders</div></div>
    <div class="stat-card"><div class="stat-num" id="statNew">0</div><div class="stat-label">New</div></div>
    <div class="stat-card"><div class="stat-num" id="statDup">0</div><div class="stat-label">Possible duplicates</div></div>
    <div class="stat-card"><div class="stat-num" id="statInvoiced">0</div><div class="stat-label">Invoiced</div></div>
    <div class="stat-card"><div class="stat-num" id="statRevenue">₹0</div><div class="stat-label">Total value</div></div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</div>
    <div class="filter-chip" data-filter="New" onclick="setFilter('New')">New</div>
    <div class="filter-chip" data-filter="Confirmed" onclick="setFilter('Confirmed')">Confirmed</div>
    <div class="filter-chip" data-filter="Packed" onclick="setFilter('Packed')">Packed</div>
    <div class="filter-chip" data-filter="Shipped" onclick="setFilter('Shipped')">Shipped</div>
    <div class="filter-chip" data-filter="Delivered" onclick="setFilter('Delivered')">Delivered</div>
    <div class="filter-chip" data-filter="Paid" onclick="setFilter('Paid')">Paid</div>
    <div class="filter-chip" data-filter="Cancelled" onclick="setFilter('Cancelled')">Cancelled</div>
    <div class="filter-chip" data-filter="dup" onclick="setFilter('dup')">⚠ Duplicates</div>
    <input class="search-input" id="searchInput" placeholder="Search name, phone, or address…" oninput="render()">
  </div>

  <div id="listContainer">
    <div class="empty-state">
      <h3>Not connected yet</h3>
      <p>Enter your Apps Script Web App URL and admin key above, then click Connect.</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Live product catalog — pulled from the Catalog Google Sheet's Apps Script
// deployment (same one used by products.html / index.html). This is a
// SEPARATE deployment from the Orders webhook above; both share the same
// admin key. We hit the admin "list" endpoint (not the public "catalog"
// endpoint) so pricing for items that have since gone inactive/out-of-stock
// still resolves correctly on old orders — the public endpoint would drop
// them and break historical pricing.
const CATALOG_API_URL = "https://script.google.com/macros/s/AKfycby4rJqrAivny6atrcgPSOaO9q9EKzs2O26JFfN-MiNFNACLd_BVFWZ1wEpnuxjF34yIeg/exec";

let CATALOG = [];        // full catalog (admin list) — used for price lookups on any item ever ordered
let CATALOG_ACTIVE = []; // Active=Y && Stock>0 subset — used for the "Add item" picker

async function loadCatalog() {
  try {
    const res = await fetch(`${CATALOG_API_URL}?action=list&key=${encodeURIComponent(apiKey())}`);
    const data = await res.json();
    if (data.status === 'ok') {
      CATALOG = data.data;
      CATALOG_ACTIVE = CATALOG.filter(p => String(p.active).trim().toUpperCase() === 'Y' && Number(p.stock) > 0);
    } else {
      console.warn('Catalog load failed', data.message);
    }
  } catch (e) {
    console.warn('Catalog load failed', e);
  }
}

function unitPrice(waKey) {
  const p = CATALOG.find(c => c.waKey === waKey);
  return p ? Number(p.mrp) : null; // unknown item — flagged in UI, never silently priced as 0
}

// Pincode → State lookup, based on the first 2 digits of the postal circle.
// Source: standard India Post PIN allocation (stable since 1972).
const PINCODE_PREFIX_STATE = {
  11:"Delhi", 12:"Haryana", 13:"Haryana", 14:"Punjab", 15:"Punjab", 16:"Punjab",
  17:"Himachal Pradesh", 18:"Jammu and Kashmir", 19:"Jammu and Kashmir",
  20:"Uttar Pradesh", 21:"Uttar Pradesh", 22:"Uttar Pradesh", 23:"Uttar Pradesh",
  24:"Uttar Pradesh", 25:"Uttar Pradesh", 26:"Uttar Pradesh", 27:"Uttar Pradesh", 28:"Uttar Pradesh",
  30:"Rajasthan", 31:"Rajasthan", 32:"Rajasthan", 33:"Rajasthan", 34:"Rajasthan",
  36:"Gujarat", 37:"Gujarat", 38:"Gujarat", 39:"Gujarat",
  40:"Maharashtra", 41:"Maharashtra", 42:"Maharashtra", 43:"Maharashtra", 44:"Maharashtra",
  45:"Madhya Pradesh", 46:"Madhya Pradesh", 47:"Madhya Pradesh", 48:"Madhya Pradesh",
  49:"Chhattisgarh",
  50:"Telangana", 51:"Andhra Pradesh", 52:"Andhra Pradesh", 53:"Andhra Pradesh",
  56:"Karnataka", 57:"Karnataka", 58:"Karnataka", 59:"Karnataka",
  60:"Tamil Nadu", 61:"Tamil Nadu", 62:"Tamil Nadu", 63:"Tamil Nadu", 64:"Tamil Nadu",
  67:"Kerala", 68:"Kerala", 69:"Kerala",
  70:"West Bengal", 71:"West Bengal", 72:"West Bengal", 73:"West Bengal", 74:"West Bengal",
  75:"Odisha", 76:"Odisha", 77:"Odisha",
  78:"Assam",
  79:"North-East India", // Arunachal/Meghalaya/Manipur/Mizoram/Nagaland/Tripura share this prefix
  80:"Bihar", 81:"Bihar", 82:"Bihar", 83:"Jharkhand", 84:"Bihar", 85:"Bihar"
};

function stateFromPincode(pincode) {
  if (!pincode || pincode.length < 3) return "";
  const p3 = parseInt(pincode.substring(0,3), 10);
  const p2 = parseInt(pincode.substring(0,2), 10);
  if (p3 === 403) return "Goa"; // sits inside the 40x Maharashtra block
  return PINCODE_PREFIX_STATE[p2] || "";
}

// ── Order & invoice lifecycle config ──────────────────────────────
const ORDER_STATUSES = {
  New:       { color:'#1D4ED8', bg:'#DBEAFE', label:'New',       next:['Confirmed','Cancelled'] },
  Confirmed: { color:'#166534', bg:'#DCFCE7', label:'Confirmed', next:['Packed','Cancelled'] },
  Packed:    { color:'#7C5C3A', bg:'#EDE6D6', label:'Packed',    next:['Shipped'] },
  Shipped:   { color:'#1E40AF', bg:'#DBEAFE', label:'Shipped',   next:['Delivered'] },
  Delivered: { color:'#14532D', bg:'#F0FDF4', label:'Delivered', next:['Paid'] },
  Paid:      { color:'#FDFCF9', bg:'#14532D', label:'Paid',      next:[] },
  Cancelled: { color:'#B91C1C', bg:'#FEE2E2', label:'Cancelled', next:[] }
};

const INVOICE_STATUSES = {
  '':               { color:'#7A6F61', bg:'#EDE6D6', label:'No invoice' },
  Draft:            { color:'#7A6F61', bg:'#EDE6D6', label:'Draft' },
  Sent:             { color:'#1E40AF', bg:'#DBEAFE', label:'Sent' },
  'Partially Paid': { color:'#9A6B0F', bg:'#FBF3E1', label:'Partially Paid' },
  Paid:             { color:'#FDFCF9', bg:'#14532D', label:'Paid' },
  Overdue:          { color:'#B91C1C', bg:'#FEF3C7', label:'Overdue' },
  'Credit Note':    { color:'#B91C1C', bg:'#FEE2E2', label:'Credit Note' }
};

const STATUS_ACTION_LABELS = {
  Confirmed: 'Confirm order',
  Packed:    'Mark packed',
  Shipped:   'Mark shipped',
  Delivered: 'Mark delivered',
  Paid:      'Record payment',
  Cancelled: 'Cancel order'
};

const LOCKED_STATUSES = ['Shipped','Delivered','Paid','Cancelled'];

function computeInvoiceStatus(o) {
  const invStatus = o.invoiceStatus || '';
  if ((invStatus === 'Sent' || invStatus === 'Partially Paid') && o.invoiceDate) {
    const issued = parseDate_(o.invoiceDate); // dd/MM/yyyy
    const due = new Date(issued.getTime() + 15 * 24 * 60 * 60 * 1000);
    if (new Date() > due) return 'Overdue';
  }
  return invStatus;
}

function parseDate_(str) {
  if (!str) return new Date();
  const [d, m, y] = str.split('/');
  return new Date(+y, +m - 1, +d);
}

function todayDDMMYYYY() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
}

function todayIso() {
  return new Date().toISOString().slice(0, 10);
}

function isoToDDMMYYYY(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function ddmmyyyyToIso(str) {
  if (!str) return '';
  const [d, m, y] = str.split('/');
  if (!d || !m || !y) return '';
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

function getStatusCfg(o) {
  const ed = getEdit(o);
  const status = ed.status || o.status || 'New';
  const orderCfg = ORDER_STATUSES[status] || ORDER_STATUSES.New;
  const invStatus = computeInvoiceStatus(o);
  const invCfg = INVOICE_STATUSES[invStatus] || INVOICE_STATUSES[''];
  return { status, orderCfg, invStatus, invCfg };
}

let orders = [];
let currentFilter = 'all';
let expandedRow = null;
let editState = {}; // rowIndex -> edit state (see getEdit)

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2600);
}

function apiUrl() {
  return document.getElementById('webhookUrl').value.trim();
}
function apiKey() {
  return document.getElementById('adminKey').value.trim();
}

async function loadOrders() {
  const url = apiUrl(), key = apiKey();
  if (!url || !key) { toast('Enter both URL and admin key', true); return; }

  document.getElementById('connectBtn').innerHTML = '<span class="spinner"></span> Connecting';
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('connDot').className = 'conn-dot';
  document.getElementById('connText').textContent = 'Connecting…';

  try {
    const [ordersRes] = await Promise.all([
      fetch(`${url}?action=list&key=${encodeURIComponent(key)}`),
      loadCatalog()
    ]);
    const data = await ordersRes.json();
    if (data.status !== 'ok') throw new Error(data.message || 'Unknown error');

    orders = data.data.map(o => {
      const fromSheet = !!(o.state && o.state.trim() && o.state.trim() !== '0');
      return {
        ...o,
        _dup: false,
        state: fromSheet ? o.state.trim() : stateFromPincode(o.pincode),
        _stateDerived: !fromSheet
      };
    });
    flagDuplicates();
    editState = {};

    document.getElementById('connDot').className = 'conn-dot ok';
    document.getElementById('connText').textContent = `Connected · ${orders.length} orders`;
    document.getElementById('statsRow').style.display = 'grid';
    document.getElementById('filterBar').style.display = 'flex';
    if (CATALOG.length === 0) toast('Orders loaded, but catalog failed to load — pricing may show "no price set"', true);
    else toast('Orders loaded');
    render();
  } catch (err) {
    document.getElementById('connDot').className = 'conn-dot err';
    document.getElementById('connText').textContent = 'Connection failed';
    toast('Failed to load: ' + err.message + ' — check the URL is deployed and the admin key matches.', true);
    document.getElementById('listContainer').innerHTML = `
      <div class="empty-state">
        <h3>Couldn't connect</h3>
        <p>${err.message}</p>
        <p style="margin-top:10px;font-size:12px">Make sure: (1) the Apps Script is deployed as a Web App with "Anyone" access, (2) the admin key matches what's in the script, (3) the deployment URL is the latest version.</p>
      </div>`;
  } finally {
    document.getElementById('connectBtn').innerHTML = 'Connect';
    document.getElementById('connectBtn').disabled = false;
  }
}

// Same customer + same day dedup, based on phone number (strongest signal)
function flagDuplicates() {
  const byPhoneDay = {};
  orders.forEach(o => {
    const day = (o.timestamp || '').split(' ')[0]; // dd/MM/yyyy part
    const k = o.phone + '|' + day;
    if (!byPhoneDay[k]) byPhoneDay[k] = [];
    byPhoneDay[k].push(o);
  });
  Object.values(byPhoneDay).forEach(group => {
    if (group.length > 1) group.forEach(o => o._dup = true);
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  render();
}

function getEdit(o) {
  if (!editState[o.rowIndex]) {
    const itemDiscounts = {};
    Object.keys(o.items).forEach(name => { itemDiscounts[name] = o.discountPct || 0; });
    editState[o.rowIndex] = {
      discountPct: o.discountPct || 0,
      items: { ...o.items },
      itemDiscounts,
      oos: new Set(),
      deleted: new Set(),
      status: o.status || 'New',
      courier: o.courier || '',
      awbNo: o.awbNo || '',
      shippedDate: o.shippedDate || '',
      expectedDelivery: o.expectedDelivery || '',
      adminNotes: o.adminNotes || '',
      showAddItem: false
    };
  }
  return editState[o.rowIndex];
}

function render() {
  const container = document.getElementById('listContainer');
  const search = document.getElementById('searchInput')?.value.toLowerCase() || '';

  let filtered = orders.filter(o => {
    if (currentFilter === 'dup' && !o._dup) return false;
    if (currentFilter !== 'all' && currentFilter !== 'dup' && (o.status || 'New') !== currentFilter) return false;
    if (search) {
      const hay = (o.customerName + ' ' + o.phone + ' ' + o.address).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Stats (computed on full set, not filtered)
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statNew').textContent = orders.filter(o => (o.status || 'New') === 'New').length;
  document.getElementById('statDup').textContent = orders.filter(o => o._dup).length;
  document.getElementById('statInvoiced').textContent = orders.filter(o => o.invoiceNo).length;
  const revenue = orders.reduce((s, o) => s + (o.finalTotal || o.orderTotal || 0), 0);
  document.getElementById('statRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>No orders match</h3><p>Try a different filter or search term.</p></div>`;
    return;
  }

  container.innerHTML = `<div class="order-list">${filtered.map(renderCard).join('')}</div>`;
}

function renderCard(o) {
  const isExpanded = expandedRow === o.rowIndex;
  const itemCount = Object.keys(o.items).length;
  const { orderCfg, invCfg } = getStatusCfg(o);

  return `
  <div class="order-card ${o._dup ? 'dup-flag' : ''} ${isExpanded ? 'expanded' : ''}" id="card-${o.rowIndex}">
    <div class="order-head" onclick="toggleCard(${o.rowIndex})">
      <div class="order-id-block">
        <div>
          <div class="order-customer">${escapeHtml(o.customerName || '(no name)')}</div>
          <div class="order-meta">${o.phone} · ${o.timestamp} · ${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
          <div class="order-flags">
            ${o._dup ? '<span class="flag flag-dup">⚠ Possible duplicate</span>' : ''}
            <span class="status-pill" style="background:${orderCfg.bg};color:${orderCfg.color}">${orderCfg.label}</span>
            <span class="status-pill" style="background:${invCfg.bg};color:${invCfg.color}">${invCfg.label}</span>
          </div>
        </div>
      </div>
      <div class="order-right">
        <div class="order-total-block">
          <div class="order-total">₹${(o.finalTotal || o.orderTotal || 0).toLocaleString('en-IN')}</div>
          ${o.finalTotal && o.finalTotal !== o.orderTotal ? `<div class="order-total-orig">₹${o.orderTotal.toLocaleString('en-IN')}</div>` : ''}
        </div>
        <div class="chevron">⌄</div>
      </div>
    </div>
    <div class="order-body">
      <div class="order-body-inner">
        ${renderBody(o)}
      </div>
    </div>
  </div>`;
}

function renderBody(o) {
  const ed = getEdit(o);
  const { status } = getStatusCfg(o);
  const isLocked = LOCKED_STATUSES.includes(status);
  const canEditItems = ['New','Confirmed','Packed'].includes(status) && !isLocked;
  const items = Object.entries(o.items).filter(([name]) => !ed.deleted.has(name));

  const itemsRows = items.map(([name, qty]) => {
    const isOos = ed.oos.has(name);
    const currentQty = ed.items[name] !== undefined ? ed.items[name] : qty;
    const price = unitPrice(name);
    const discPct = ed.itemDiscounts[name] || 0;
    const lineGross = (price !== null && !isOos) ? price * currentQty : null;
    const discAmt = lineGross !== null ? Math.round(lineGross * discPct) / 100 : null;
    const lineNet = lineGross !== null ? lineGross - discAmt : null;
    const rowLocked = isLocked || isOos;

    return `
      <tr>
        <td class="${isOos ? 'item-name-oos' : ''}">${escapeHtml(name)}${price === null ? ' <span style="color:var(--red);font-size:11px">(no price set)</span>' : ''}</td>
        <td class="num"><input type="number" class="qty-input" min="0" value="${currentQty}"
             ${rowLocked ? 'disabled' : ''} onchange="updateItemQty(${o.rowIndex}, '${escAttr(name)}', this.value)"></td>
        <td class="num"><input type="number" class="disc-input" min="0" max="100" value="${discPct}"
             ${rowLocked ? 'disabled' : ''} onchange="updateItemDisc(${o.rowIndex}, '${escAttr(name)}', this.value)"></td>
        <td class="disc-cell">
          ${lineGross !== null ? `
            <div class="disc-orig">₹${lineGross.toLocaleString('en-IN')}</div>
            ${discAmt > 0 ? `<div class="disc-saved">−₹${discAmt.toLocaleString('en-IN')}</div>` : ''}
            <div class="disc-net">₹${lineNet.toLocaleString('en-IN')}</div>
          ` : '—'}
        </td>
        <td><button class="oos-btn ${isOos ? 'active' : ''}" ${isLocked ? 'disabled' : ''} onclick="toggleOos(${o.rowIndex}, '${escAttr(name)}')">
          ${isOos ? 'Out of stock' : 'Mark OOS'}</button></td>
        <td>${canEditItems ? `<button class="del-item-btn" title="Remove item" onclick="deleteItem(${o.rowIndex}, '${escAttr(name)}')">✕</button>` : ''}</td>
      </tr>`;
  }).join('');

  const math = computeOrderMath(o);
  const discInfo = orderDiscountDisplay(o);

  return `
    <div class="body-grid">
      <div>
        <table class="items-table">
          <thead><tr><th>Item</th><th style="text-align:right">Qty</th><th style="text-align:right">Disc %</th><th style="text-align:right">Line total</th><th>Stock</th><th></th></tr></thead>
          <tbody>${itemsRows}</tbody>
        </table>
        ${isLocked ? `<div class="locked-note">Editing locked — order has shipped or later.</div>` : ''}
        ${math.unknownItems.length ? `<div class="notes-box" style="color:var(--red);border-color:var(--red);margin-top:10px">
          Price not found for: ${math.unknownItems.map(escapeHtml).join(', ')}. These are excluded from totals below — check the item still exists in the catalog.
        </div>` : ''}
        ${canEditItems ? renderAddItemPanel(o) : ''}
        <div style="margin-top:12px" class="notes-box">
          ${o.notes ? escapeHtml(o.notes) : 'No notes from customer'}
        </div>
      </div>
      <div class="side-panel">
        <div class="panel-section">
          <div class="panel-label">Contact</div>
          <div class="contact-line">
            <strong>Phone:</strong> ${o.phone}<br>
            <strong>Pincode:</strong> ${o.pincode}<br>
            <strong>State:</strong> ${o.state ? escapeHtml(o.state) + (o._stateDerived !== false ? ' <span style="color:var(--stone);font-size:11px">(from pincode)</span>' : '') : '<span style="color:var(--red)">unknown — check pincode</span>'}<br>
            <strong>Address:</strong> ${escapeHtml(o.address)}
          </div>
        </div>

        ${renderStatusSection(o)}

        <div class="panel-section">
          <div class="panel-label">Pricing</div>
          <div class="field-row">
            <label>Discount %</label>
            <input type="number" min="0" max="100"
              value="${discInfo.mixed ? '' : discInfo.value}"
              placeholder="${discInfo.mixed ? 'Mixed' : ''}"
              style="${discInfo.mixed ? 'color:var(--stone);font-style:italic' : ''}"
              onchange="applyOrderDiscount(${o.rowIndex}, this.value)" ${isLocked ? 'disabled' : ''}>
          </div>
          <div class="totals-box" style="margin-top:10px">
            <div class="totals-row"><span>Subtotal (in-stock items)</span><span>₹${math.subtotal.toLocaleString('en-IN')}</span></div>
            <div class="totals-row"><span>Discount</span><span>− ₹${math.discountAmt.toLocaleString('en-IN')}</span></div>
            <div class="totals-row final"><span>Payable</span><span>₹${math.final.toLocaleString('en-IN')}</span></div>
          </div>
          ${o.orderTotal && Math.abs(math.subtotal - o.orderTotal) > 1 && ed.oos.size === 0 && ed.deleted.size === 0 && math.unknownItems.length === 0 ?
            `<div style="font-size:11px;color:var(--amber);margin-top:6px">⚠ Recalculated subtotal (₹${math.subtotal}) differs from sheet's Order Total (₹${o.orderTotal}) — worth a quick check.</div>` : ''}
        </div>

        ${renderShippingSection(o)}
        ${renderPaymentSection(o)}

        <div class="action-row">
          <button class="btn btn-primary btn-sm" onclick="saveOrder(${o.rowIndex})">Save changes</button>
          <button class="btn btn-wa btn-sm" onclick="sendWhatsAppConfirm(${o.rowIndex})">WhatsApp confirmation</button>
          <button class="btn btn-secondary btn-sm" onclick="generateInvoice(${o.rowIndex})">Generate invoice</button>
        </div>
      </div>
    </div>
  `;
}

function renderStatusSection(o) {
  const ed = getEdit(o);
  const { status, orderCfg, invCfg } = getStatusCfg(o);
  const buttons = (orderCfg.next || []).map(next => {
    const label = STATUS_ACTION_LABELS[next] || ('Mark ' + next);
    const cls = next === 'Cancelled' ? 'btn-danger' : 'btn-secondary';
    return `<button class="btn ${cls} btn-sm" onclick="changeStatus(${o.rowIndex}, '${next}')">${label}</button>`;
  }).join('');

  return `
    <div class="panel-section">
      <div class="panel-label">Status</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span class="status-pill" style="background:${orderCfg.bg};color:${orderCfg.color}">${orderCfg.label}</span>
        <span class="status-pill" style="background:${invCfg.bg};color:${invCfg.color}">${invCfg.label}</span>
      </div>
      <div class="action-btn-group">${buttons || '<span style="font-size:12px;color:var(--stone)">No further actions</span>'}</div>
    </div>`;
}

function renderShippingSection(o) {
  const ed = getEdit(o);
  const { status } = getStatusCfg(o);
  if (!['Packed','Shipped','Delivered','Paid'].includes(status)) return '';
  const editable = status === 'Packed';

  const row = (label, field, val, type) => {
    if (!editable) return `<div class="field-row"><label>${label}</label><div>${val ? escapeHtml(val) : '—'}</div></div>`;
    if (type === 'date') {
      return `<div class="field-row"><label>${label}</label><input type="date" value="${ddmmyyyyToIso(val)}" onchange="updateShippingField(${o.rowIndex}, '${field}', isoToDDMMYYYY(this.value))"></div>`;
    }
    return `<div class="field-row"><label>${label}</label><input type="text" value="${escAttr(val)}" onchange="updateShippingField(${o.rowIndex}, '${field}', this.value)"></div>`;
  };

  return `
    <div class="shipping-section">
      <div class="section-mini-label">Shipping</div>
      ${row('Courier', 'courier', ed.courier, 'text')}
      ${row('AWB / Tracking', 'awbNo', ed.awbNo, 'text')}
      ${row('Shipped date', 'shippedDate', ed.shippedDate, 'date')}
      ${row('Expected delivery', 'expectedDelivery', ed.expectedDelivery, 'date')}
      ${!editable ? '<div class="locked-note">Locked after shipping — contact the courier to amend.</div>' : ''}
    </div>`;
}

function renderPaymentSection(o) {
  const { status } = getStatusCfg(o);
  if (!['Delivered','Paid'].includes(status)) return '';
  const math = computeOrderMath(o);
  const finalTotal = o.finalTotal || math.final;

  if (status === 'Paid') {
    return `
      <div class="payment-section">
        <div class="section-mini-label">Payment</div>
        <div class="field-row"><label>Mode</label><div>${o.paymentMode ? escapeHtml(o.paymentMode) : '—'}</div></div>
        <div class="field-row"><label>Reference</label><div>${o.paymentRef ? escapeHtml(o.paymentRef) : '—'}</div></div>
        <div class="field-row"><label>Amount paid</label><div>₹${(o.amountPaid || 0).toLocaleString('en-IN')}</div></div>
        <div class="field-row"><label>Paid on</label><div>${o.paymentDate ? escapeHtml(o.paymentDate) : '—'}</div></div>
      </div>`;
  }

  const remaining = finalTotal - (o.amountPaid || 0);
  const defaultAmount = remaining > 0 ? remaining : finalTotal;

  return `
    <div class="payment-section" id="paySection-${o.rowIndex}">
      <div class="section-mini-label">Payment</div>
      ${o.amountPaid > 0 ? `<div class="locked-note" style="font-style:normal;margin-bottom:8px">Already paid ₹${o.amountPaid.toLocaleString('en-IN')} — balance due ₹${(o.balanceDue || remaining).toLocaleString('en-IN')}</div>` : ''}
      <div class="field-row"><label>Mode</label>
        <select id="payMode-${o.rowIndex}">
          ${['UPI','Bank Transfer','Cash','COD','Other'].map(m => `<option ${o.paymentMode === m ? 'selected' : ''}>${m}</option>`).join('')}
        </select></div>
      <div class="field-row"><label>Amount paid</label><input type="number" id="payAmount-${o.rowIndex}" min="0" value="${defaultAmount}"></div>
      <div class="field-row"><label>UTR / Ref</label><input type="text" id="payRef-${o.rowIndex}" placeholder="Transaction reference"></div>
      <div class="field-row"><label>Payment date</label><input type="date" id="payDate-${o.rowIndex}" value="${todayIso()}"></div>
      <div class="action-btn-group"><button class="btn btn-primary btn-sm" onclick="recordPayment(${o.rowIndex})">Record payment</button></div>
    </div>`;
}

function renderAddItemPanel(o) {
  const ed = getEdit(o);
  return `
    <div class="add-item-toggle">
      <button class="btn btn-ghost btn-sm" onclick="toggleAddItem(${o.rowIndex})">${ed.showAddItem ? '− Hide' : '+ Add item to order'}</button>
      ${ed.showAddItem ? renderAddItemForm(o) : ''}
    </div>`;
}

function renderAddItemForm(o) {
  const ed = getEdit(o);
  const options = CATALOG_ACTIVE.map(p => `<option value="${escAttr(p.waKey)}">`).join('');
  return `
    <div class="add-item-form">
      <input type="text" list="catalogDL-${o.rowIndex}" id="addItemName-${o.rowIndex}" placeholder="Search product…">
      <datalist id="catalogDL-${o.rowIndex}">${options}</datalist>
      <input type="number" id="addItemQty-${o.rowIndex}" value="1" min="1" title="Qty">
      <input type="number" id="addItemDisc-${o.rowIndex}" value="${ed.discountPct || 0}" min="0" max="100" title="Disc %">
      <button class="btn btn-primary btn-sm" onclick="confirmAddItem(${o.rowIndex})">Add item</button>
      <button class="btn btn-secondary btn-sm" onclick="toggleAddItem(${o.rowIndex})">Cancel</button>
    </div>`;
}

// Exact line-item computation, incorporating per-item discounts. Returns
// null-price items separately so the UI can warn rather than silently
// mis-total the order.
function computeOrderMath(o) {
  const ed = getEdit(o);
  let subtotal = 0;
  let discountAmt = 0;
  let unknownItems = [];
  Object.entries(ed.items).forEach(([name, qty]) => {
    if (ed.oos.has(name) || ed.deleted.has(name) || qty <= 0) return;
    const price = unitPrice(name);
    if (price === null) { unknownItems.push(name); return; }
    const lineGross = price * qty;
    const discPct = ed.itemDiscounts[name] || 0;
    subtotal += lineGross;
    discountAmt += Math.round(lineGross * discPct) / 100;
  });
  const final = subtotal - discountAmt;
  return { subtotal, discountAmt, final, unknownItems };
}

// Whether every active item shares the same discount % — if not, the
// order-level field displays "Mixed" instead of a single number.
function orderDiscountDisplay(o) {
  const ed = getEdit(o);
  const activeNames = Object.keys(ed.items).filter(n => !ed.oos.has(n) && !ed.deleted.has(n));
  if (activeNames.length === 0) return { mixed: false, value: ed.discountPct || 0 };
  const vals = activeNames.map(n => ed.itemDiscounts[n] || 0);
  const allSame = vals.every(v => v === vals[0]);
  return { mixed: !allSame, value: allSame ? vals[0] : null };
}

function estimateFinal(o) {
  return computeOrderMath(o).final;
}

function toggleCard(rowIndex) {
  expandedRow = expandedRow === rowIndex ? null : rowIndex;
  render();
}

function updateItemQty(rowIndex, name, val) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  ed.items[name] = Math.max(0, parseInt(val) || 0);
  render();
  reExpand(rowIndex);
}

function updateItemDisc(rowIndex, name, val) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  ed.itemDiscounts[name] = Math.max(0, Math.min(100, parseFloat(val) || 0));
  render();
  reExpand(rowIndex);
}

function toggleOos(rowIndex, name) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  if (ed.oos.has(name)) ed.oos.delete(name); else ed.oos.add(name);
  render();
  reExpand(rowIndex);
}

function deleteItem(rowIndex, name) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  ed.deleted.add(name);
  ed.items[name] = 0;
  ed.adminNotes = (ed.adminNotes ? ed.adminNotes + ' ' : '') + `[Removed: ${name} on ${todayDDMMYYYY()}]`;
  render();
  reExpand(rowIndex);
}

function applyOrderDiscount(rowIndex, val) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  const pct = Math.max(0, Math.min(100, parseFloat(val) || 0));
  ed.discountPct = pct;
  Object.keys(ed.items).forEach(name => {
    if (!ed.oos.has(name) && !ed.deleted.has(name)) ed.itemDiscounts[name] = pct;
  });
  render();
  reExpand(rowIndex);
}

function toggleAddItem(rowIndex) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  ed.showAddItem = !ed.showAddItem;
  render();
  reExpand(rowIndex);
}

async function confirmAddItem(rowIndex) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  const nameInput = document.getElementById('addItemName-' + rowIndex).value.trim();
  const qty = Math.max(1, parseInt(document.getElementById('addItemQty-' + rowIndex).value) || 1);
  const discPct = Math.max(0, Math.min(100, parseFloat(document.getElementById('addItemDisc-' + rowIndex).value) || 0));

  const product = CATALOG_ACTIVE.find(p => p.waKey === nameInput);
  if (!product) { toast('Select a valid product from the list', true); return; }

  const newQty = (ed.items[product.waKey] || 0) + qty;
  ed.items[product.waKey] = newQty;
  ed.itemDiscounts[product.waKey] = discPct;
  ed.deleted.delete(product.waKey);
  ed.showAddItem = false;

  try {
    const res = await fetch(apiUrl(), {
      method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ key: apiKey(), action: 'addItemToOrder', rowIndex, itemName: product.waKey, qty: newQty })
    });
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message);
    o.items[product.waKey] = newQty;
    toast('Item added');
  } catch (err) {
    toast('Added locally, but failed to save to sheet: ' + err.message, true);
  }
  render();
  reExpand(rowIndex);
}

function updateShippingField(rowIndex, field, value) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  getEdit(o)[field] = value;
}

async function changeStatus(rowIndex, newStatus) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);

  if (newStatus === 'Paid') {
    // Actual transition happens through the Payment panel — just surface it.
    reExpand(rowIndex);
    render();
    setTimeout(() => document.getElementById('paySection-' + rowIndex)?.scrollIntoView({ behavior:'smooth', block:'center' }), 50);
    return;
  }
  if (newStatus === 'Cancelled' && !confirm('Cancel this order? This cannot be undone from here.')) return;

  const fields = { 'Status': newStatus };
  if (newStatus === 'Shipped' && !ed.shippedDate) { ed.shippedDate = todayDDMMYYYY(); fields['Shipped Date'] = ed.shippedDate; }
  if (newStatus === 'Delivered') fields['Delivered Date'] = todayDDMMYYYY();

  try {
    const res = await fetch(apiUrl(), {
      method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ key: apiKey(), action: 'update', rowIndex, fields })
    });

async function recordPayment(rowIndex) {

  const ed = getEdit(o);
  const amountPaid = parseFloat(document.getElementById('payAmount-' + rowIndex).value) || 0;
  const paymentMode = document.getElementById('payMode-' + rowIndex).value;
  const paymentRef = document.getElementById('payRef-' + rowIndex).value.trim();
  const paymentDateIso = document.getElementById('payDate-' + rowIndex).value;
  const paymentDate = isoToDDMMYYYY(paymentDateIso) || todayDDMMYYYY();

  try {
    const res = await fetch(apiUrl(), {
      method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ key: apiKey(), action: 'recordPayment', rowIndex, amountPaid, paymentMode, paymentRef, paymentDate })
    });
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'Unknown error');

    o.amountPaid = amountPaid;
    o.balanceDue = data.balanceDue;
    o.paymentMode = paymentMode;

async function saveOrder(rowIndex) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  const url = apiUrl(), key = apiKey();

  const math = computeOrderMath(o);
  const zeroedItems = {};
  ed.oos.forEach(name => zeroedItems[name] = 0);
  Object.entries(ed.items).forEach(([name, qty]) => {
    if (!ed.oos.has(name)) zeroedItems[name] = qty;
  });

  const payload = {
    key: key,
    action: 'update',
    rowIndex: rowIndex,
    fields: {
      'Status': ed.status || 'New',
      'Discount %': ed.discountPct || 0,
      'Discount Amount': math.discountAmt,
      'Final Total': math.final,
      'Courier': ed.courier || '',
      'AWB No': ed.awbNo || '',
      'Shipped Date': ed.shippedDate || '',
      'Expected Delivery': ed.expectedDelivery || '',
      'Admin Notes': ed.adminNotes || ''
    },
    items: zeroedItems
  };

  try {
    const res = await fetch(url, { method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message);
    Object.assign(o, {
      status: ed.status, discountPct: ed.discountPct, discountAmount: math.discountAmt, finalTotal: math.final,
      courier: ed.courier, awbNo: ed.awbNo, shippedDate: ed.shippedDate, expectedDelivery: ed.expectedDelivery,
      adminNotes: ed.adminNotes
    });
    Object.assign(o.items, zeroedItems);
    toast('Saved to sheet');
    render();
    reExpand(rowIndex);
  } catch (err) {
    toast('Save failed: ' + err.message, true);
  }
}

const HOME_STATE = "Chhattisgarh"; // GAPL's registered state — determines IGST vs CGST+SGST

async function generateInvoice(rowIndex) {
  const o = orders.find(x => x.rowIndex === rowIndex);
  const ed = getEdit(o);
  const math = computeOrderMath(o);

  if (math.unknownItems.length > 0) {
    toast('Cannot generate invoice — missing price for: ' + math.unknownItems.join(', '), true);
    return;
  }

  // Open the window synchronously so browsers don't treat it as a blocked popup
  // once we start awaiting the invoice-number fetch below.
  const win = window.open('', '_blank');
  if (win) win.document.write('<p style="font-family:sans-serif;padding:40px;color:#555">Generating invoice…</p>');

  let invoiceNo = o.invoiceNo;
  if (!invoiceNo) {
    try {
      const res = await fetch(apiUrl(), {
        method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ key: apiKey(), action: 'getNextInvoiceNo' })
      });
      const data = await res.json();
      if (data.status !== 'ok') throw new Error(data.message || 'Could not get invoice number');
      invoiceNo = data.invoiceNo;
    } catch (err) {
      toast('Could not get invoice number: ' + err.message, true);
      if (win) win.close();
      return;
    }
  }

  const today = new Date();
  const dueDate = new Date(today.getTime() + 15 * 24 * 60 * 60 * 1000);
  const fmt = d => d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

  const isIntraState = (o.state || '').trim().toLowerCase() === HOME_STATE.toLowerCase();

  const lineItems = Object.entries(ed.items)
    .filter(([name, qty]) => !ed.oos.has(name) && !ed.deleted.has(name) && qty > 0)
    .map(([name, qty], i) => {
      const price = unitPrice(name);
      const discPct = ed.itemDiscounts[name] || 0;
      const grossAmount = price * qty;
      const discAmt = Math.round(grossAmount * discPct) / 100;
      const amount = grossAmount - discAmt; // taxable base after per-item discount
      // GST rate: organic dals/rice/flour/spices are 0%, oils and ghee carry 5% total tax
      // (matches the pattern in the reference invoice). Split into CGST+SGST if intra-state,
      // otherwise charged as IGST.
      const isOil = /oil|ghee/i.test(name);
      const totalRate = isOil ? 5 : 0;
      const totalTaxAmt = Math.round(amount * totalRate / 100 * 100) / 100;
      if (isIntraState) {
        const halfRate = totalRate / 2;
        const halfAmt = Math.round(totalTaxAmt / 2 * 100) / 100;
        return { sn: i + 1, name, qty, price, discPct, discAmt, cgstRate: halfRate, cgstAmt: halfAmt,
                  sgstRate: halfRate, sgstAmt: halfAmt, igstRate: 0, igstAmt: 0,
                  totalTaxAmt: halfAmt * 2, amount, grossAmount };
      }
      return { sn: i + 1, name, qty, price, discPct, discAmt, cgstRate: 0, cgstAmt: 0, sgstRate: 0, sgstAmt: 0,
                igstRate: totalRate, igstAmt: totalTaxAmt, totalTaxAmt, amount, grossAmount };
    });

  const oosLineItems = Array.from(ed.oos).map(name => ({ name, qty: o.items[name] }));

  const subTotal = math.subtotal;
  const discountAmt = math.discountAmt;
  const taxableValue = subTotal - discountAmt;
  const totalCgst = lineItems.reduce((s, li) => s + li.cgstAmt, 0);
  const totalSgst = lineItems.reduce((s, li) => s + li.sgstAmt, 0);
  const totalIgst = lineItems.reduce((s, li) => s + li.igstAmt, 0);
  const totalGst = totalCgst + totalSgst + totalIgst;
  const grandTotal = Math.round((taxableValue + totalGst) * 100) / 100;

  // Don't downgrade an already Paid/Partially Paid invoice just because it was reprinted.
  const newInvoiceStatus = ['Paid','Partially Paid'].includes(o.invoiceStatus) ? o.invoiceStatus : 'Sent';
  const invCfg = INVOICE_STATUSES[newInvoiceStatus] || INVOICE_STATUSES.Sent;
  const paymentReceived = (o.status === 'Paid') ? { mode: o.paymentMode, ref: o.paymentRef, date: o.paymentDate, amount: o.amountPaid } : null;

  const html = buildInvoiceHtml({
    invoiceNo, date: fmt(today), dueDate: fmt(dueDate),
    customer: o, lineItems, oosLineItems, subTotal, discountAmt, taxableValue,
    totalCgst, totalSgst, totalIgst, totalGst, grandTotal, isIntraState,
    invoiceBadge: { label: invCfg.label.toUpperCase(), bg: invCfg.bg, color: invCfg.color },
    paymentReceived
  });

  if (win) { win.document.open(); win.document.write(html); win.document.close(); }

  // Persist invoice fields back to sheet (fire and forget — invoice is already shown)
  const url = apiUrl(), key = apiKey();
  fetch(url, {
    method: 'POST', headers: {'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({
      key, action: 'update', rowIndex,
      fields: {
        'Invoice No': invoiceNo,
        'Invoice Date': todayDDMMYYYY(),
        'Invoice Status': newInvoiceStatus,
        'Invoice Sent Date': o.invoiceSentDate || todayDDMMYYYY(),
        'Discount Amount': discountAmt,
        'Final Total': grandTotal
      }
    })
  }).then(r => r.json()).then(d => {
    if (d.status === 'ok') {
      o.invoiceNo = invoiceNo; o.invoiceDate = todayDDMMYYYY(); o.invoiceStatus = newInvoiceStatus;
      o.invoiceSentDate = o.invoiceSentDate || todayDDMMYYYY();
      o.finalTotal = grandTotal;
      toast('Invoice ' + invoiceNo + ' generated');
      render(); reExpand(rowIndex);
    }
  }).catch(() => toast('Invoice opened, but failed to save status to sheet', true));
}

function numberToWords(num) {
  const a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function inWords(n) {
    if (n < 20) return a[n];
    if (n < 100) return b[Math.floor(n/10)] + (n%10 ? ' ' + a[n%10] : '');
    if (n < 1000) return a[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' And ' + inWords(n%100) : '');
    if (n < 100000) return inWords(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ', ' + inWords(n%1000) : '');
    return inWords(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ', ' + inWords(n%100000) : '');
  }
  const rupees = Math.floor(num);
  const paise = Math.round((num - rupees) * 100);
  let words = 'Indian Rupee ' + (rupees > 0 ? inWords(rupees) : 'Zero');
  if (paise > 0) words += ' And ' + inWords(paise) + ' Paise';
  return words + ' Only';
}
